# App
spring.application.name=${SPRING_APP_NAME}-dev
server.port=${HOST_PORT}
spring.log.level=${SPRING_LOG_LEVEL}

# Security
jwt.secret=${SPRING_JWT_SECRET}
jwt.issuer=${SPRING_JWT_ISSUER}
jwt.public=${SPRING_JWT_PUBLIC}

# MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${HOST_DB_PORT}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true

# OpenAPI / Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Microservicios downstream (orquestación)
services.sales.base-url=${SALES_API_BASE_URL:http://localhost:8082/api/v1/sales}
services.invoices.base-url=${INVOICES_API_BASE_URL:http://localhost:8087/api/v1/invoices}
services.users.base-url=${USERS_API_BASE_URL:http://localhost:8081/api/v1/users}
